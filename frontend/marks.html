<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles/shared.css">
    <title>Marks – Chartwell E-Diary</title>
</head>
<body>

<nav class="topnav">
    <span class="topnav-brand">Chartwell E-Diary</span>
    <div class="topnav-right">
        <span id="navUserName"></span>
        <button id="logoutBtn">Log out</button>
    </div>
</nav>

<div class="page-layout">
    <aside class="sidebar">
        <a href="teacher.html"><span class="icon">🏠</span> Dashboard</a>
        <a href="schedule.html"><span class="icon">📅</span> Schedule</a>
        <a href="profile.html"><span class="icon">👤</span> Profile</a>
    </aside>

    <main class="content">
        <div class="card">
            <div class="card-title">📝 Student Marks</div>
            <div id="tabsContainer" class="tabs"></div>
            <div style="margin-bottom:12px;">
                <button id="addGradeBtn" class="btn btn-primary btn-sm" style="display:none;">+ Add Grade</button>
            </div>
            <div id="marksContainer"><p class="loading">Loading marks…</p></div>
        </div>

        <!-- Add Grade Modal -->
        <div id="gradeModal" class="modal-overlay" style="display:none;">
            <div class="modal" style="max-width:420px;">
                <div class="modal-header">
                    <h2 id="gradeModalTitle">Add Grade</h2>
                    <button id="gradeModalClose" class="modal-close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group" id="gradeStudentGroup">
                        <label>Student</label>
                        <select id="gradeStudent" class="form-input"></select>
                    </div>
                    <div class="form-group">
                        <label>Assessment name</label>
                        <input id="gradeAssessment" class="form-input" placeholder="e.g. Unit Test, Essay, Homework 3…">
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="flex:1;">
                            <label>Category</label>
                            <select id="gradeCategory" class="form-input">
                                <option value="exam">Exam</option>
                                <option value="test">Test</option>
                                <option value="minitest">Minitest</option>
                                <option value="quiz">Quiz</option>
                                <option value="project">Project</option>
                                <option value="homework">Homework</option>
                                <option value="classwork">Classwork</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Term</label>
                            <select id="gradeTerm" class="form-input">
                                <option value="1">Term 1 (Sep – Dec)</option>
                                <option value="2">Term 2 (Jan – Jun)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="flex:1;">
                            <label>Grade</label>
                            <select id="gradeCode" class="form-input">
                                <option value="A*">A*</option>
                                <option value="A">A</option>
                                <option value="A-">A-</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                                <option value="D">D</option>
                                <option value="E">E</option>
                                <option value="U">U</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Percentage <small>(optional)</small></label>
                            <input id="gradePercent" class="form-input" type="number" min="0" max="100" placeholder="e.g. 87">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Comment <small>(optional)</small></label>
                        <textarea id="gradeComment" class="form-input" rows="2" placeholder="e.g. Great improvement, needs to review chapter 5…"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="gradeModalDelete" class="btn btn-danger" style="display:none;margin-right:auto;">Delete</button>
                    <button id="gradeModalCancel" class="btn btn-secondary">Cancel</button>
                    <button id="gradeModalSave" class="btn btn-primary">Save Grade</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="scripts/auth.js"></script>
<script src="scripts/marks.js"></script>
</body>
</html>
