<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles/themes.css"><link rel="stylesheet" href="styles/shared.css">
    <title>Dashboard – Chartwell E-Diary</title>
<script src="scripts/theme-loader.js"></script></head>
<body>

<nav class="topnav">
    <div class="topnav-left">
        <button id="sidebarToggleBtn" class="sidebar-toggle-btn" title="Toggle sidebar">☰</button>
        <span class="topnav-brand">Chartwell E-Diary</span>
    </div>
    <div class="topnav-right">
        <span id="navUserName"></span>
        <button id="logoutBtn">Log out</button>
    </div>
</nav>

<div class="page-layout">
    <aside class="sidebar">
        <a href="dashboard.html" class="active"><span class="icon">🏠</span> Dashboard</a>
        <a href="schedule.html"><span class="icon">📅</span> Schedule</a>
        <a href="profile.html"><span class="icon">👤</span> Profile</a>
    </aside>

    <main class="content dashboard-page">
        <div class="card" data-card-id="homework">
            <div class="card-title">
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
                🌯 Homework &amp; Tasks
            </div>
            <div class="card-content" id="announcementsContainer"><p class="loading">Loading…</p></div>
        </div>

        <div class="card" data-card-id="grades">
            <div class="card-title">
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
                📋 Recent Grades
            </div>
            <div class="card-content" id="recentGradesContainer"><p class="loading">Loading…</p></div>
        </div>

        <div class="card" data-card-id="attendance">
            <div class="card-title">
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
                📈 Recent Attendance
            </div>
            <div class="card-content" id="attendanceContainer"><p class="loading">Loading…</p></div>
        </div>

        <div class="card" data-card-id="behavioral">
            <div class="card-title">
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
                📋 Behavioral Notes
            </div>
            <div class="card-content" id="behavioralContainer"><p class="loading">Loading…</p></div>
        </div>
    </main>
</div>

<script src="scripts/auth.js"></script>
<script src="scripts/dashboard.js"></script>
</body>
</html>
