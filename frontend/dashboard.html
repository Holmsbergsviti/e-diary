<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="preconnect" href="https://e-diary-backend-qsly.onrender.com">
    <link rel="stylesheet" href="styles/themes.css">
    <link rel="stylesheet" href="styles/shared.css">
    <title>Dashboard – E-Diary</title>
    <script src="scripts/theme-loader.js"></script></head>
<body>

<nav class="topnav">
    <div class="topnav-left">
        <button id="sidebarToggleBtn" class="sidebar-toggle-btn" title="Toggle sidebar">☰</button>
        <span class="topnav-brand">E-Diary</span>
    </div>
    <div class="topnav-right">
        <span id="navUserName"></span>
        <button id="logoutBtn">Log out</button>
    </div>
</nav>

<div class="page-layout">
    <aside class="sidebar"></aside>

    <main class="content dashboard-page">
        <div class="card" data-card-id="homework">
            <div class="card-title">
                🌯 Homework &amp; Tasks
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
            </div>
            <div class="card-content" id="announcementsContainer"><p class="loading">Loading…</p></div>
        </div>

        <div class="card" data-card-id="grades">
            <div class="card-title">
                📋 Recent Grades
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
            </div>
            <div class="card-content" id="recentGradesContainer"><p class="loading">Loading…</p></div>
        </div>

        <div class="card" data-card-id="behavioral">
            <div class="card-title">
                📋 Behavioral Notes
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
            </div>
            <div class="card-content" id="behavioralContainer"><p class="loading">Loading…</p></div>
        </div>
    </main>
</div>

<script src="scripts/auth.js"></script>
<script src="scripts/dashboard.js"></script>
</body>
</html>
