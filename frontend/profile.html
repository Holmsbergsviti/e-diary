<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles/themes.css">
    <link rel="stylesheet" href="styles/shared.css">
    <title>Profile – Chartwell E-Diary</title>
<script src="scripts/theme-loader.js"></script></head>
<body>

<nav class="topnav">
    <span class="topnav-brand">Chartwell E-Diary</span>
    <div class="topnav-right">
        <span id="navUserName"></span>
        <button id="logoutBtn">Log out</button>
    </div>
</nav>

<div class="page-layout">
    <aside class="sidebar">
        <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
        <a href="schedule.html"><span class="icon">📅</span> Schedule</a>
        <a href="profile.html" class="active"><span class="icon">👤</span> Profile</a>
    </aside>

    <main class="content">
        <div class="card" style="max-width:520px;">
            <div class="card-title">👤 My Profile</div>
            <div id="profileContainer"><p class="loading">Loading…</p></div>
        </div>

        <div class="card" style="max-width:520px;">
            <div class="card-title">🔒 Account Settings</div>
            <form id="accountForm" autocomplete="off">
                <div class="form-group">
                    <label for="newEmail">Email</label>
                    <input type="email" id="newEmail" class="form-input" placeholder="New email address">
                </div>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-input" placeholder="New password (min 4 chars)">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm new password">
                </div>
                <p id="accountMsg" class="form-msg"></p>
                <button type="submit" class="btn btn-primary" id="saveAccountBtn">Save Changes</button>
            </form>
        </div>

        <div class="card" style="max-width:520px;">
            <div class="card-title">🎨 Color Palette</div>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 16px;">Choose your preferred color theme:</p>
            <div class="palette-grid">
                <button class="palette-btn palette-active" data-theme="bright-blue" title="Bright Blue">
                    <span class="palette-preview" style="background: #2563eb;"></span>
                    <span class="palette-label">Bright Blue</span>
                </button>
                <button class="palette-btn" data-theme="ocean" title="Ocean">
                    <span class="palette-preview" style="background: #0369a1;"></span>
                    <span class="palette-label">Ocean</span>
                </button>
                <button class="palette-btn" data-theme="purple" title="Purple">
                    <span class="palette-preview" style="background: #7c3aed;"></span>
                    <span class="palette-label">Purple</span>
                </button>
                <button class="palette-btn" data-theme="emerald" title="Emerald">
                    <span class="palette-preview" style="background: #059669;"></span>
                    <span class="palette-label">Emerald</span>
                </button>
                <button class="palette-btn" data-theme="rose" title="Rose">
                    <span class="palette-preview" style="background: #e11d48;"></span>
                    <span class="palette-label">Rose</span>
                </button>
                <button class="palette-btn" data-theme="amber" title="Amber">
                    <span class="palette-preview" style="background: #ea580c;"></span>
                    <span class="palette-label">Amber</span>
                </button>
                <button class="palette-btn" data-theme="indigo" title="Indigo">
                    <span class="palette-preview" style="background: #4f46e5;"></span>
                    <span class="palette-label">Indigo</span>
                </button>
                <button class="palette-btn" data-theme="teal" title="Teal">
                    <span class="palette-preview" style="background: #14b8a6;"></span>
                    <span class="palette-label">Teal</span>
                </button>
                <button class="palette-btn" data-theme="mint" title="Mint">
                    <span class="palette-preview" style="background: #10b981;"></span>
                    <span class="palette-label">Mint</span>
                </button>
                <button class="palette-btn" data-theme="coral" title="Coral">
                    <span class="palette-preview" style="background: #ff6b6b;"></span>
                    <span class="palette-label">Coral</span>
                </button>
            </div>
            <p id="paletteMsg" class="form-msg"></p>
        </div>
    </main>
</div>

<script src="scripts/auth.js"></script>
<script src="scripts/profile.js"></script>
</body>
</html>
