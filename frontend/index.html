<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles/loginPage.css">
    <title>Chartwell International School E-Diary</title>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <img src="images/icon.png" alt="Chartwell logo" class="login-logo">
            <h1>E-Diary</h1>
            <p class="login-subtitle">Chartwell International School</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" autocomplete="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>

            <div id="errorMsg" class="error-msg" aria-live="polite"></div>

            <button type="submit" id="submitBtn">LOG IN</button>
        </form>
    </div>
</div>

<script src="scripts/main.js"></script>
</body>
</html>
