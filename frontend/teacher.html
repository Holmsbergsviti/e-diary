<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles/shared.css">
    <title>Teacher Dashboard – Chartwell E-Diary</title>
</head>
<body>

<nav class="topnav">
    <span class="topnav-brand">Chartwell E-Diary</span>
    <div class="topnav-right">
        <span id="navUserName"></span>
        <button id="logoutBtn">Log out</button>
    </div>
</nav>

<div class="page-layout">
    <aside class="sidebar">
        <a href="teacher.html" class="active"><span class="icon">🏠</span> Dashboard</a>
        <a href="schedule.html"><span class="icon">📅</span> Schedule</a>
        <a href="marks.html"><span class="icon">📝</span> Marks</a>
        <a href="profile.html"><span class="icon">👤</span> Profile</a>
    </aside>

    <main class="content">
        <!-- Today's classes -->
        <div class="card">
            <div class="card-title">📅 Today's Classes</div>
            <div id="todayClasses"><p class="loading">Loading…</p></div>
        </div>

        <!-- Attendance Modal (hidden by default) -->
        <div id="attendanceModal" class="modal-overlay" style="display:none;">
            <div class="modal">
                <div class="modal-header">
                    <div>
                        <h2 id="modalTitle">Take Attendance</h2>
                        <p id="modalSubtitle" class="modal-subtitle"></p>
                    </div>
                    <button id="modalClose" class="modal-close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="attendance-date-row">
                        <label for="attendanceDate">Date:</label>
                        <input type="date" id="attendanceDate">
                    </div>
                    <div id="studentList"><p class="loading">Loading students…</p></div>
                </div>
                <div class="modal-footer">
                    <button id="markAllPresent" class="btn btn-secondary">Mark all present</button>
                    <button id="saveAttendance" class="btn btn-primary">Save Attendance</button>
                </div>
            </div>
        </div>

        <!-- Full week schedule -->
        <div class="card">
            <div class="card-title">📋 Weekly Schedule</div>
            <div id="weeklySchedule"><p class="loading">Loading schedule…</p></div>
        </div>
    </main>
</div>

<script src="scripts/auth.js"></script>
<script src="scripts/teacher.js"></script>
</body>
</html>
