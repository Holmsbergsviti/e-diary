<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="preconnect" href="https://e-diary-backend-qsly.onrender.com">
    <link rel="stylesheet" href="styles/themes.css">
    <link rel="stylesheet" href="styles/shared.css">
    <title>Teacher Dashboard – E-Diary</title>
    <script src="scripts/theme-loader.js"></script></head>
<body>

<nav class="topnav">
    <div class="topnav-left">
        <button id="sidebarToggleBtn" class="sidebar-toggle-btn" title="Toggle sidebar">☰</button>
        <span class="topnav-brand">E-Diary</span>
    </div>
    <div class="topnav-right">
        <span id="navUserName"></span>
        <button id="logoutBtn">Log out</button>
    </div>
</nav>

<div class="page-layout">
    <aside class="sidebar"></aside>

    <main class="content teacher-page">
        <!-- Today's classes -->
        <div class="card" data-card-id="today-classes">
            <div class="card-title">
                📅 Today's Classes
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
            </div>
            <div class="card-content" id="todayClasses"><p class="loading">Loading…</p></div>
        </div>

        <!-- Homework section -->
        <div class="card" data-card-id="homework-teacher">
            <div class="card-title">
                <span>📝 Homework / Tasks</span>
                <button id="addHomeworkBtn" class="btn btn-primary btn-sm">+ Add</button>
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
            </div>
            <div class="card-content" id="homeworkList"><p class="loading">Loading…</p></div>
        </div>

        <!-- Behavioral notes section -->
        <div class="card" data-card-id="behavioral-teacher">
            <div class="card-title">
                <span>📋 Behavioral Notes</span>
                <button id="addBehavioralBtn" class="btn btn-primary btn-sm">+ Add</button>
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
            </div>
            <div class="card-content" id="behavioralList"><p class="loading">Loading…</p></div>
        </div>

        <!-- Behavioral Modal -->
        <div id="behavioralModal" class="modal-overlay" style="display:none;">
            <div class="modal" style="max-width:480px;">
                <div class="modal-header">
                    <h2>Add Behavioral Note</h2>
                    <button id="behModalClose" class="modal-close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Subject &amp; Class</label>
                        <select id="behClassSelect" class="form-input"></select>
                    </div>
                    <div class="form-group">
                        <label>Student</label>
                        <select id="behStudentSelect" class="form-input">
                            <option value="">Select a class first…</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="flex:1;">
                            <label>Type</label>
                            <select id="behType" class="form-input">
                                <option value="positive">Positive</option>
                                <option value="negative">Negative</option>
                                <option value="note">Note</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex:1;">
                            <label>Severity</label>
                            <select id="behSeverity" class="form-input">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Details</label>
                        <textarea id="behContent" class="form-input" rows="3" placeholder="Describe the behavior…"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="behSave" class="btn btn-primary">Save Note</button>
                </div>
            </div>
        </div>

        <!-- Homework Modal -->
        <div id="homeworkModal" class="modal-overlay" style="display:none;">
            <div class="modal" style="max-width:480px;">
                <div class="modal-header">
                    <h2>Add Homework</h2>
                    <button id="hwModalClose" class="modal-close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Subject &amp; Class</label>
                        <select id="hwClassSelect" class="form-input"></select>
                    </div>
                    <div class="form-group">
                        <label>Title</label>
                        <input id="hwTitle" class="form-input" type="text" placeholder="e.g. Chapter 5 exercises">
                    </div>
                    <div class="form-group">
                        <label>Description <small>(optional)</small></label>
                        <textarea id="hwDesc" class="form-input" rows="3" placeholder="Details, page numbers, etc."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input id="hwDueDate" class="form-input" type="date">
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="hwSave" class="btn btn-primary">Save Homework</button>
                </div>
            </div>
        </div>

        <!-- Homework Completion Modal -->
        <div id="hwCompletionModal" class="modal-overlay" style="display:none;">
            <div class="modal" style="max-width:600px;">
                <div class="modal-header">
                    <div>
                        <h2 id="hwCompTitle">Homework Completion</h2>
                        <p id="hwCompSubtitle" class="modal-subtitle"></p>
                    </div>
                    <button id="hwCompClose" class="modal-close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div id="hwCompStudentList"><p class="loading">Loading students…</p></div>
                </div>
                <div class="modal-footer">
                    <button id="hwCompSave" class="btn btn-primary">Save Completion</button>
                </div>
            </div>
        </div>

        <!-- Attendance Modal (hidden by default) -->
        <div id="attendanceModal" class="modal-overlay" style="display:none;">
            <div class="modal">
                <div class="modal-header">
                    <div>
                        <h2 id="modalTitle">Take Attendance</h2>
                        <p id="modalSubtitle" class="modal-subtitle"></p>
                    </div>
                    <button id="modalClose" class="modal-close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="attendance-date-row">
                        <label for="attendanceDate">Date:</label>
                        <input type="date" id="attendanceDate">
                    </div>
                    <div id="studentList"><p class="loading">Loading students…</p></div>
                </div>
                <div class="modal-footer">
                    <button id="markAllPresent" class="btn btn-secondary">Mark all present</button>
                    <button id="saveAttendance" class="btn btn-primary">Save Attendance</button>
                </div>
            </div>
        </div>

        <!-- Class Statistics section -->
        <div class="card" data-card-id="class-statistics">
            <div class="card-title">
                📋 Class Statistics
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
            </div>
            <div class="card-content" id="classStatsList"><p class="loading">Loading…</p></div>
        </div>

        <!-- Full week schedule -->
        <div class="card" data-card-id="weekly-schedule">
            <div class="card-title week-nav-header">
                <button id="weekPrev" class="week-arrow" title="Previous week">&#8249;</button>
                <span>📋 <span id="weekLabel">This Week</span></span>
                <button id="weekNext" class="week-arrow" title="Next week">&#8250;</button>
                <button class="card-collapse-btn" title="Hide/Show card">−</button>
            </div>
            <div class="card-content" id="weeklySchedule"><p class="loading">Loading schedule…</p></div>
        </div>
    </main>
</div>

<script src="scripts/auth.js"></script>
<script src="scripts/teacher.js"></script>
</body>
</html>
