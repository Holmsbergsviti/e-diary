<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="preconnect" href="https://e-diary-backend-qsly.onrender.com">
    <link rel="stylesheet" href="styles/themes.css">
    <link rel="stylesheet" href="styles/shared.css">
    <title>Reports – E-Diary</title>
    <script src="scripts/theme-loader.js"></script></head>
<body>

<nav class="topnav">
    <div class="topnav-left">
        <button id="sidebarToggleBtn" class="sidebar-toggle-btn" title="Toggle sidebar">☰</button>
        <span class="topnav-brand">E-Diary</span>
    </div>
    <div class="topnav-right">
        <span id="navUserName"></span>
        <button id="logoutBtn">Log out</button>
    </div>
</nav>

<div class="page-layout">
    <aside class="sidebar"></aside>

    <main class="content marks-page">
        <div class="card">
            <div class="card-title">🧾 Teacher Reports</div>
            <div class="term-filter" id="reportTermTabs">
                <button class="term-btn active" data-term="1">Winter Report</button>
                <button class="term-btn" data-term="2">End of Year Report</button>
            </div>
            <div id="reportContainer"><p class="loading">Loading reports…</p></div>
        </div>
    </main>
</div>

<script src="scripts/auth.js"></script>
<script src="scripts/report.js"></script>
</body>
</html>
