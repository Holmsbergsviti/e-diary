<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="preconnect" href="https://e-diary-backend-qsly.onrender.com">
    <link rel="stylesheet" href="styles/themes.css">
    <link rel="stylesheet" href="styles/shared.css">
    <title>Schedule – E-Diary</title>
    <script src="scripts/theme-loader.js"></script></head>
<body>

<nav class="topnav">
    <div class="topnav-left">
        <button id="sidebarToggleBtn" class="sidebar-toggle-btn" title="Toggle sidebar">☰</button>
        <span class="topnav-brand">E-Diary</span>
    </div>
    <div class="topnav-right">
        <span id="navUserName"></span>
        <button id="logoutBtn">Log out</button>
    </div>
</nav>

<div class="page-layout">
    <aside class="sidebar"></aside>

    <main class="content schedule-page">
        <div class="card">
            <div class="card-title week-nav-header">
                <button id="weekPrev" class="week-arrow" title="Previous week">&#8249;</button>
                <span>📅 <span id="weekLabel">This Week</span></span>
                <button id="weekNext" class="week-arrow" title="Next week">&#8250;</button>
            </div>
            <div id="scheduleContainer"><p class="loading">Loading schedule…</p></div>
        </div>

        <!-- Attendance Modal for teachers (hidden by default) -->
        <div id="attendanceModal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
            <div class="modal">
                <div class="modal-header">
                    <div>
                        <h2 id="modalTitle">Take Attendance</h2>
                        <p id="modalSubtitle" class="modal-subtitle"></p>
                    </div>
                    <button id="modalClose" class="modal-close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="attendance-date-row">
                        <label for="attendanceDate">Date:</label>
                        <input type="date" id="attendanceDate">
                    </div>
                    <div class="form-group" style="margin-top:8px;">
                        <label for="lessonTopic" style="font-weight:600;font-size:0.88rem;">Lesson Topic</label>
                        <input type="text" id="lessonTopic" class="form-input" placeholder="e.g. Quadratic equations, Chapter 5…">
                    </div>
                    <div id="studentList"><p class="loading">Loading students…</p></div>
                </div>
                <div class="modal-footer">
                    <button id="markAllPresent" class="btn btn-secondary">Mark all present</button>
                    <button id="saveAttendance" class="btn btn-primary">Save Attendance</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="scripts/auth.js"></script>
<script src="scripts/schedule.js"></script>
</body>
</html>
