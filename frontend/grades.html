<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="preconnect" href="https://e-diary-backend-qsly.onrender.com">
    <link rel="stylesheet" href="styles/themes.css">
    <link rel="stylesheet" href="styles/shared.css">
    <title>Grades – E-Diary</title>
    <script src="scripts/theme-loader.js"></script></head>
<body>

<nav class="topnav">
    <div class="topnav-left">
        <button id="sidebarToggleBtn" class="sidebar-toggle-btn" title="Toggle sidebar">☰</button>
        <span class="topnav-brand">E-Diary</span>
    </div>
    <div class="topnav-right">
        <span id="navUserName"></span>
        <button id="logoutBtn">Log out</button>
    </div>
</nav>

<div class="page-layout">
    <aside class="sidebar"></aside>

    <main class="content grades-page">
        <div class="stat-row">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">–</div>
                <div class="stat-label">Total subjects</div>
            </div>
        </div>

        <div class="term-filter" id="termFilter">
            <button class="term-btn" data-term="">Both Terms</button>
            <button class="term-btn" data-term="1">Term 1 <small>(Sep–Dec)</small></button>
            <button class="term-btn" data-term="2">Term 2 <small>(Jan–Jun)</small></button>
        </div>

        <div id="gradesContainer"><p class="loading">Loading grades…</p></div>
    </main>
</div>

<script src="scripts/auth.js"></script>
<script src="scripts/grades.js"></script>
</body>
</html>
