<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="styles/shared.css">
    <title>Grades – Chartwell E-Diary</title>
</head>
<body>

<nav class="topnav">
    <span class="topnav-brand">Chartwell E-Diary</span>
    <div class="topnav-right">
        <span id="navUserName"></span>
        <button id="logoutBtn">Log out</button>
    </div>
</nav>

<div class="page-layout">
    <aside class="sidebar">
        <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
        <a href="schedule.html"><span class="icon">📅</span> Schedule</a>
        <a href="profile.html"><span class="icon">👤</span> Profile</a>
    </aside>

    <main class="content grades-page">
        <div class="stat-row">
            <div class="stat-card">
                <div class="stat-value" id="statTotal">–</div>
                <div class="stat-label">Total subjects</div>
            </div>
        </div>

        <div class="term-filter" id="termFilter">
            <button class="term-btn" data-term="">Both Terms</button>
            <button class="term-btn" data-term="1">Term 1 <small>(Sep–Dec)</small></button>
            <button class="term-btn" data-term="2">Term 2 <small>(Jan–Jun)</small></button>
        </div>

        <div id="gradesContainer"><p class="loading">Loading grades…</p></div>
    </main>
</div>

<script src="scripts/auth.js"></script>
<script src="scripts/grades.js"></script>
</body>
</html>
